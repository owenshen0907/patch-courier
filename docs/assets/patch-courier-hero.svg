<svg width="1536" height="640" viewBox="0 0 1536 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Patch Courier</title>
  <desc id="desc">A wide project banner for Patch Courier, showing trusted email threads routed into local coding work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1536" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="0.54" stop-color="#102D3A"/>
      <stop offset="1" stop-color="#F2A54A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF9ED"/>
      <stop offset="1" stop-color="#F3E4C8"/>
    </linearGradient>
    <linearGradient id="glow" x1="336" y1="83" x2="1106" y2="573" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9BE7D8" stop-opacity="0.46"/>
      <stop offset="0.55" stop-color="#F2A54A" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F2A54A" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1536" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#04101A" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1536" height="640" rx="44" fill="url(#bg)"/>
  <rect width="1536" height="640" rx="44" fill="url(#grid)"/>
  <ellipse cx="792" cy="300" rx="580" ry="260" fill="url(#glow)"/>
  <circle cx="1328" cy="94" r="192" fill="#FFE6AE" fill-opacity="0.11"/>
  <circle cx="1208" cy="526" r="260" fill="#071827" fill-opacity="0.18"/>

  <g transform="translate(140 122)">
    <rect x="0" y="0" width="228" height="228" rx="54" fill="#0B2230" stroke="#F6CB7B" stroke-opacity="0.46" stroke-width="3" filter="url(#shadow)"/>
    <rect x="42" y="64" width="144" height="100" rx="18" fill="url(#card)"/>
    <path d="M45 77L113 123L183 77" stroke="#0B2230" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78 151H124" stroke="#1FB79A" stroke-width="10" stroke-linecap="round"/>
    <path d="M78 130H151" stroke="#D97932" stroke-width="10" stroke-linecap="round"/>
    <path d="M64 42C104 16 151 19 188 49" stroke="#9BE7D8" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 20"/>
    <path d="M182 46L200 59L179 69" fill="#9BE7D8"/>
  </g>

  <g transform="translate(456 146)">
    <text x="0" y="56" fill="#FFF9ED" font-family="Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" letter-spacing="-2.2">Patch Courier</text>
    <text x="2" y="112" fill="#BFEDE6" font-family="Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="0.7">CODE FROM ANYWHERE. EXECUTE LOCALLY.</text>
    <text x="2" y="170" fill="#F7EBD5" fill-opacity="0.92" font-family="Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="500">Route trusted email threads into local Codex work, approvals, and results.</text>

    <g transform="translate(0 238)" filter="url(#softShadow)">
      <rect x="0" y="0" width="226" height="58" rx="29" fill="#FFF3D8" fill-opacity="0.97"/>
      <circle cx="33" cy="29" r="11" fill="#1FB79A"/>
      <text x="58" y="38" fill="#092030" font-family="Avenir Next, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800">trusted inbox</text>

      <rect x="256" y="0" width="214" height="58" rx="29" fill="#FFF3D8" fill-opacity="0.97"/>
      <path d="M289 30H332" stroke="#D97932" stroke-width="8" stroke-linecap="round"/>
      <path d="M314 13L334 30L314 47" stroke="#D97932" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="354" y="38" fill="#092030" font-family="Avenir Next, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800">local agent</text>

      <rect x="500" y="0" width="238" height="58" rx="29" fill="#FFF3D8" fill-opacity="0.97"/>
      <path d="M536 18V40M525 29H548" stroke="#1FB79A" stroke-width="7" stroke-linecap="round"/>
      <text x="568" y="38" fill="#092030" font-family="Avenir Next, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800">patch delivered</text>
    </g>
  </g>

  <g transform="translate(1048 152) rotate(-7)">
    <rect x="0" y="0" width="310" height="240" rx="28" fill="#FFF9ED" filter="url(#softShadow)"/>
    <rect x="28" y="30" width="254" height="30" rx="15" fill="#EAD8B8"/>
    <rect x="28" y="84" width="86" height="18" rx="9" fill="#1FB79A"/>
    <rect x="130" y="84" width="104" height="18" rx="9" fill="#D97932"/>
    <rect x="28" y="122" width="210" height="14" rx="7" fill="#AFC8C1"/>
    <rect x="28" y="154" width="244" height="14" rx="7" fill="#AFC8C1"/>
    <rect x="28" y="186" width="178" height="14" rx="7" fill="#AFC8C1"/>
    <path d="M251 181L282 207L317 164" stroke="#102D3A" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M372 244C534 196 647 224 762 288C884 356 982 356 1087 288" stroke="#F6CB7B" stroke-width="10" stroke-linecap="round" stroke-dasharray="4 28"/>
  <path d="M1088 288L1062 273L1066 309L1088 288Z" fill="#F6CB7B"/>
</svg>
