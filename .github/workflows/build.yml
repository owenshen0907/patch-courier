name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos-build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test daemon helpers
        run: xcodebuild -project PatchCourier.xcodeproj -scheme MailroomDaemon -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO test

      - name: Build daemon
        run: xcodebuild -project PatchCourier.xcodeproj -scheme MailroomDaemon -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

      - name: Build macOS app
        run: xcodebuild -project PatchCourier.xcodeproj -scheme PatchCourierMac -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build
